<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>앱 아이콘 후보 · 하니의 한글 모험</title>
<!--
  하니 캐릭터를 살린 앱 아이콘 후보들.
  tools/make_icon.js가 이 페이지를 열어 #a/#b/#c 중 하나를 512×512 PNG로 찍는다.
  ?guide=1 을 붙이면 마스커블 안전영역(중앙 80%) 가이드가 보인다 — 검토용, 결과물엔 안 들어간다.

  색은 현재 icon-512.png에서 픽셀을 직접 뽑았다: 세로 그라디언트 #FE9F77 → #E8542F.
  하니 캐릭터는 app-data.js의 aiHaniCore()를 그대로 재사용한다(앱과 같은 그림이어야 한다).
-->
<link rel="stylesheet" href="../assets/fonts/fonts.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#3a3a3a;color:#eee;font-family:'Gowun Dodum',sans-serif;
       display:flex;gap:40px;padding:40px;align-items:flex-start;}
  figure{text-align:center;}
  figcaption{margin-top:14px;font-size:15px;color:#ccc;}

  /* --icon-size는 ?size=NNN 으로 바뀐다. 배지 글자 말고는 전부 %라 어떤 크기로도 그대로 스케일된다. */
  :root{--icon-size:512px;}
  .icon{width:var(--icon-size);height:var(--icon-size);position:relative;overflow:hidden;}
  .icon svg.body{position:absolute;inset:0;width:100%;height:100%;}

  /* 현재 아이콘과 같은 주황 그라디언트 */
  .warm{background:linear-gradient(180deg,#FE9F77 0%,#E8542F 100%);}
  /* 앱 헤더 아바타와 같은 크림 코인 */
  .cream{background:linear-gradient(180deg,#FFF4D8 0%,#FBEAC0 100%);}

  /* 배경 위 부드러운 원 — 현재 아이콘에도 있는 요소 */
  .halo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
        width:66%;height:66%;border-radius:50%;background:#fff;opacity:.18;}

  /* 후보 C의 「한」 배지 — 마스커블 안전영역(중심에서 반지름 40%) 안에 완전히 들어와야 한다.
     배지 반지름 10.5% → 배지 중심은 중심에서 29% 이내여야 함.
     right/bottom 20%/19% ⇒ 중심 오프셋 (19.5, 20.5) ⇒ 거리 28.3% < 29% ✓ */
  .badge{position:absolute;right:20%;bottom:19%;width:21%;height:21%;border-radius:50%;
         background:#FFFAEE;color:#C6772E;font-family:'Jua',sans-serif;font-size:60px;
         display:flex;align-items:center;justify-content:center;
         box-shadow:0 6px 14px rgba(120,40,10,.28);}

  /* 마스커블 안전영역 가이드(검토용) */
  .guide::after{content:'';position:absolute;left:10%;top:10%;width:80%;height:80%;
                border:3px dashed rgba(255,255,255,.85);border-radius:50%;pointer-events:none;}
</style>
</head>
<body>
  <figure><div class="icon warm" id="a"><div class="halo"></div></div>
    <figcaption>A · 주황 배경 + 하니</figcaption></figure>

  <figure><div class="icon cream" id="b"></div>
    <figcaption>B · 크림 코인 + 하니 (앱 헤더와 동일)</figcaption></figure>

  <figure><div class="icon warm" id="c"><div class="halo"></div><div class="badge">한</div></div>
    <figcaption>C · 주황 배경 + 하니 + 「한」 배지</figcaption></figure>

<script src="../app-data.js"></script>
<script>
  // 하니는 app-data.js의 것을 그대로 쓴다.
  // aiHaniCore()는 0~100 좌표계를 거의 꽉 채우므로, 마스커블 안전영역(중앙 80%)에
  // 들어오도록 중심 기준으로 줄인다. 배지가 있는 C는 하니를 조금 더 왼쪽 위로 옮긴다.
  function haniSvg(scale, dx, dy){
    return '<svg class="body" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" '
      + 'role="img" aria-label="병아리 하니">'
      + '<g transform="translate(' + (50+dx) + ',' + (50+dy) + ') scale(' + scale + ') translate(-50,-50)">'
      + '<g class="hani">' + aiHaniCore({}) + '</g></g></svg>';
  }

  if (typeof aiHaniCore === 'function') {
    // scale 0.66 = 하니의 발끝(원본 y≈97)까지 안전영역 안에 들어오는 값.
    // dy -3 은 머리 깃털과 발 사이 여백을 위아래로 맞추기 위한 미세 조정.
    document.getElementById('a').insertAdjacentHTML('beforeend', haniSvg(0.66, 0, -3));
    document.getElementById('b').insertAdjacentHTML('beforeend', haniSvg(0.66, 0, -3));
    document.getElementById('c').insertAdjacentHTML('beforeend', haniSvg(0.56, -7, -6));
    document.documentElement.dataset.hani = 'ok';
  } else {
    document.documentElement.dataset.hani = 'missing';
  }

  var q = new URLSearchParams(location.search);
  if (q.has('guide')) {
    document.querySelectorAll('.icon').forEach(el => el.classList.add('guide'));
  }
  // ?size=192 — 실제 출력 크기로 직접 렌더한다(512를 축소하면 가장자리가 뭉개진다).
  if (q.has('size')) {
    var px = parseInt(q.get('size'), 10);
    document.documentElement.style.setProperty('--icon-size', px + 'px');
    // 배지 글자만 px 고정값이라 크기에 비례해 맞춰 준다.
    document.querySelectorAll('.badge').forEach(function (el) {
      el.style.fontSize = (60 * px / 512) + 'px';
    });
  }
  // ?only=b — 그 후보만 남긴다(단독 렌더용).
  if (q.has('only')) {
    var keep = q.get('only');
    document.querySelectorAll('figure').forEach(function (f) {
      if (f.querySelector('.icon').id !== keep) f.remove();
    });
    document.querySelectorAll('figcaption').forEach(function (c) { c.remove(); });
    document.body.style.padding = '0';
    document.body.style.background = '#000';
  }
</script>
</body>
</html>
